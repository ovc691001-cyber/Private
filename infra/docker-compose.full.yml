services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: volatility
      POSTGRES_PASSWORD: volatility
      POSTGRES_DB: volatility_club
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://volatility:volatility@postgres:5432/volatility_club?schema=public
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ..
      dockerfile: apps/frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
  redis-data:
